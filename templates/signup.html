{% extends "layout.html" %}
{% block title %}회원가입 — Wogether{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-box fade-up">
    <div class="auth-logo">Wogether</div>
    <p class="auth-sub">크루를 만들고, 목표를 세우고, 함께 달성하세요</p>
    <div class="card card-neon-c">
      <form method="POST">
        <div class="form-group">
          <label class="form-label">아이디</label>
          <input type="text" name="username" placeholder="아이디 (영문+숫자)" required>
        </div>
        <div class="form-group">
          <label class="form-label">닉네임</label>
          <input type="text" name="nickname" placeholder="크루에서 보일 이름" required>
        </div>
        <div class="form-group">
          <label class="form-label">비밀번호</label>
          <input type="password" name="password" placeholder="비밀번호" required>
        </div>
        <button type="submit" class="btn btn-cyan btn-full mt-8">시작하기 →</button>
      </form>
    </div>
    <div class="auth-switch">이미 계정이 있나요? <a href="{{ url_for('login') }}">로그인</a></div>
  </div>
</div>
{% endblock %}
