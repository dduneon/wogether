{% extends "layout.html" %}
{% block title %}새 게시물 만들기{% endblock %}

{% block content %}
    <div class="creation-container">
        <h2>새 게시물 만들기</h2>

        <form method="POST" enctype="multipart/form-data" id="upload-form" onsubmit="prepareUpload()">

            <div class="file-upload-wrapper">

                <label for="photo" class="file-upload-label">
                    ➕ 사진 추가하기
                </label>
                <input type="file" id="photo" name="photo" accept="image/*" multiple
                       style="display: none;" onchange="handleFileSelect(this)">

                <div id="file-count-display" class="file-count-text">
                    선택된 사진이 없습니다.
                </div>

                <div class="image-preview-box" id="image-preview-box" style="display: none;">
                    <div id="preview-grid" class="preview-grid">
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label for="caption" style="display:none;">한마디</label>
                <textarea id="caption" name="caption" rows="4"
                          placeholder="오늘의 운동 한마디를 적어주세요..."></textarea>
            </div>

            <button type="submit" class="btn">공유하기</button>
        </form>
    </div>

    <script>
        // 전역 변수로 선택된 파일들을 관리 (DataTransfer 객체 사용)
        // DataTransfer는 파일 입력을 프로그래밍 방식으로 조작할 때 사용하는 표준 API입니다.
        let dataTransfer = new DataTransfer();

        function handleFileSelect(input) {
            const files = input.files;

            // 새로 선택된 파일들을 dataTransfer에 추가
            for (let i = 0; i < files.length; i++) {
                // (선택 사항) 중복 방지 로직을 넣을 수도 있음
                dataTransfer.items.add(files[i]);
            }

            // 화면 갱신
            updateUI();

            // input 값 초기화 (같은 파일을 다시 선택해도 이벤트가 발생하도록)
            input.value = '';
        }

        function removeFile(index) {
            // dataTransfer에서 해당 인덱스의 파일 삭제
            // DataTransfer.items는 remove 메서드가 인덱스를 받음
            const newDataTransfer = new DataTransfer();

            for (let i = 0; i < dataTransfer.files.length; i++) {
                if (i !== index) {
                    newDataTransfer.items.add(dataTransfer.files[i]);
                }
            }

            dataTransfer = newDataTransfer; // 교체
            updateUI();
        }

        function updateUI() {
            const previewBox = document.getElementById('image-preview-box');
            const previewGrid = document.getElementById('preview-grid');
            const countDisplay = document.getElementById('file-count-display');

            // 1. 미리보기 초기화
            previewGrid.innerHTML = '';

            const files = dataTransfer.files;

            if (files.length > 0) {
                // UI 보이기
                previewBox.style.display = 'block';
                countDisplay.textContent = `총 ${files.length}장의 사진`;
                countDisplay.style.color = '#0095f6';
                countDisplay.style.fontWeight = 'bold';

                // 2. 파일 목록 순회하며 미리보기 생성
                Array.from(files).forEach((file, index) => {
                    const reader = new FileReader();

                    reader.onload = function(e) {
                        // 카드 컨테이너
                        const card = document.createElement('div');
                        card.classList.add('preview-card');

                        // 이미지
                        const img = document.createElement('img');
                        img.src = e.target.result;
                        img.classList.add('preview-thumbnail');

                        // 삭제 버튼 (X)
                        const delBtn = document.createElement('button');
                        delBtn.innerHTML = '&times;';
                        delBtn.classList.add('preview-delete-btn');
                        delBtn.type = 'button'; // submit 방지
                        delBtn.onclick = function() {
                            removeFile(index);
                        };

                        // 조립
                        card.appendChild(img);
                        card.appendChild(delBtn);
                        previewGrid.appendChild(card);
                    };

                    reader.readAsDataURL(file);
                });

            } else {
                // 파일이 없으면 숨김
                previewBox.style.display = 'none';
                countDisplay.textContent = '선택된 사진이 없습니다.';
                countDisplay.style.color = '#8e8e8e';
                countDisplay.style.fontWeight = 'normal';
            }
        }

        // 폼 제출 직전에 실행
        function prepareUpload() {
            // 우리가 관리하던 dataTransfer의 파일 목록을
            // 실제 <input type="file">에 주입해줍니다.
            const fileInput = document.getElementById('photo');
            fileInput.files = dataTransfer.files;
        }
    </script>

{% endblock %}
