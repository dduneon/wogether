{% extends "layout.html" %}
{% block title %}로그인 — Wogether{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-box fade-up">
    <div class="auth-logo">Wogether</div>
    <p class="auth-sub">크루와 함께 운동 목표를 달성하세요 💪</p>
    <div class="card card-neon-p">
      <form method="POST">
        <div class="form-group">
          <label class="form-label">아이디</label>
          <input type="text" name="username" placeholder="아이디를 입력하세요" required>
        </div>
        <div class="form-group">
          <label class="form-label">비밀번호</label>
          <input type="password" name="password" placeholder="비밀번호를 입력하세요" required>
        </div>
        <button type="submit" class="btn btn-primary btn-full mt-8">로그인</button>
      </form>
    </div>
    <div class="auth-switch">계정이 없으신가요? <a href="{{ url_for('signup') }}">회원가입</a></div>
  </div>
</div>
{% endblock %}
