<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}오운스타그램{% endblock %}</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <link href="https://fonts.googleapis.com/css2?family=Cookie&display=swap" rel="stylesheet">
</head>
<body>
    <header class="top-nav">
        <div class="nav-content">
            <a href="{{ url_for('index') }}" class="nav-logo">Owoonstagram</a>
            <div class="nav-links">
                {% if current_user.is_authenticated %}
                    <a href="{{ url_for('create_post') }}">➕ 새 게시물</a>
                    <a href="{{ url_for('profile', username=current_user.username) }}">👤 내 프로필</a>
                    <a href="{{ url_for('logout') }}">로그아웃</a>
                {% else %}
                    <a href="{{ url_for('login') }}">로그인</a>
                    <a href="{{ url_for('signup') }}">회원가입</a>
                {% endif %}
            </div>
        </div>
    </header>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <ul class="flash-messages">
        {% for message in messages %}
          <li style="background: #fff; border: 1px solid #dbdbdb; padding: 10px; max-width: 600px; margin: 10px auto;">{{ message }}</li>
        {% endfor %}
        </ul>
      {% endif %}
    {% endwith %}

    <main class="main-container">
        {% block content %}{% endblock %}
    </main>

</body>
</html>
