<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="brandH" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
    <clipPath id="clip">
      <rect x="0" y="0" width="32" height="32" rx="7"/>
    </clipPath>
  </defs>
  <!-- 배경 -->
  <rect x="0" y="0" width="32" height="32" rx="7" fill="#100020"/>
  <g clip-path="url(#clip)">
    <!-- 배경 흰색 W 선 (반투명) -->
    <polyline points="1,1 6,20 11,9 16,20 21,9 26,20 31,1"
      fill="none" stroke="#FFFFFF" stroke-width="7"
      stroke-linecap="round" stroke-linejoin="round" stroke-opacity="0.06"/>
    <!-- 네온 W 윤곽 -->
    <polyline points="3,7 7.5,22 12,13 16,22 20,13 24.5,22 29,7"
      fill="none" stroke="url(#brandH)" stroke-width="2.4"
      stroke-linecap="round" stroke-linejoin="round"/>
    <!-- 캐릭터 3개 얼굴 -->
    <!-- 왼쪽 -->
    <circle cx="7.5" cy="25" r="4" fill="#FFFFFF" stroke="#8B5CF6" stroke-width="0.8"/>
    <circle cx="6" cy="24" r="0.9" fill="#100020"/>
    <circle cx="9" cy="24" r="0.9" fill="#100020"/>
    <path d="M6,26.5 Q7.5,28 9,26.5" fill="none" stroke="#8B5CF6" stroke-width="0.7" stroke-linecap="round"/>
    <!-- 가운데 -->
    <circle cx="16" cy="25.5" r="4.8" fill="#FFFFFF" stroke="url(#brandH)" stroke-width="0.9"/>
    <circle cx="14.2" cy="24.4" r="1.1" fill="#100020"/>
    <circle cx="17.8" cy="24.4" r="1.1" fill="#100020"/>
    <path d="M14.2,27 Q16,28.5 17.8,27" fill="none" stroke="#22D3EE" stroke-width="0.8" stroke-linecap="round"/>
    <!-- 오른쪽 -->
    <circle cx="24.5" cy="25" r="4" fill="#FFFFFF" stroke="#22D3EE" stroke-width="0.8"/>
    <circle cx="23" cy="24" r="0.9" fill="#100020"/>
    <circle cx="26" cy="24" r="0.9" fill="#100020"/>
    <path d="M23,26.5 Q24.5,28 26,26.5" fill="none" stroke="#22D3EE" stroke-width="0.7" stroke-linecap="round"/>
  </g>
  <!-- 아이콘 테두리 -->
  <rect x="0" y="0" width="32" height="32" rx="7" fill="none" stroke="url(#brandH)" stroke-width="0.8" stroke-opacity="0.6"/>
</svg>
